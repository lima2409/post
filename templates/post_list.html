{% extends 'base.html' %}

{% block title %}
Посты
{% endblock %}

{% block content %}
<h1>Посты</h1>

{% for post in posts %}
    <div>
        <h2>{{ post.title }}</h2>
        <p>{{ post.content }}</p>
        <p>Рейтинг: {{ post.rating }}</p>
    </div>
{% empty %}
    <p>Нет постов</p>
{% endfor %}
{% endblock %}
